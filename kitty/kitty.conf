
# Minimal Tab bar styling 
tab_bar_edge                bottom                
tab_bar_style                powerline 
tab_bar_align center
tab_powerline_style         slanted
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}
# font_family                 JetBrains Mono Nerd Font 

# remap to open new kitty tab in the same directory (default is home dir)
map ctrl+shift+t            new_tab_with_cwd
# Uncomment the following 4 lines to minimize kitty latency (higher energy usage)
input_delay 0
repaint_delay 2
sync_to_monitor yes
wayland_enable_ime no
notify_on_cmd_finish invisible 20
allow_remote_control yes
# BEGIN_KITTY_FONTS
font_family      family="Victor Mono"
bold_font        auto
italic_font      auto
modify_font cell_height 100%
bold_italic_font auto
# END_KITTY_FONTS
cursor_shape block
# # CUrsor setting
cursor_trail 1
# cursor_trail_decay 0.1 0.4
# cursor_trail_start_threshold 4
# BEGIN_KITTY_THEME
#include theme.conf
# END_KITTY_THEME
# Better stack trace visibility
include sandstorm.conf
