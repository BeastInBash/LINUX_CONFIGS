##### ────────────────────────────────
##### 🧩 Basic Settings
##### ────────────────────────────────
unbind r
bind r source-file ~/.tmux.conf \; display-message "🔄 Config reloaded!"

# Prefix
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Mouse support
set -g mouse on

# Terminal capabilities
set -g default-terminal "xterm-256color"
set -as terminal-overrides ',xterm-256color:Tc'

# Preserve env vars
set-option -g update-environment "PATH TERM LANG LC_ALL"

# Shell
set -g default-shell /usr/bin/fish
set -g default-command "fish -l"


##### ────────────────────────────────
##### 🪟 Pane / Window Management
##### ────────────────────────────────

# Custom splits
unbind %
unbind '"'
bind | split-window -h
bind - split-window -v

# Resize panes with hjkl (prefix + key)
bind-key -r h resize-pane -L 5
bind-key -r j resize-pane -D 5
bind-key -r k resize-pane -U 5
bind-key -r l resize-pane -R 5

# Resize panes with Alt + arrows
bind -n M-h resize-pane -L 2
bind -n M-l resize-pane -R 2
bind -n M-k resize-pane -U 2
bind -n M-j resize-pane -D 2

# Rename window
bind g command-prompt -I "#W" "rename-window '%%'"

# Vi mode for copy
setw -g mode-keys vi

# History and indexing
set -g history-limit 1000000
set -g renumber-windows on
set -g base-index 1
set -g set-clipboard on


##### ────────────────────────────────
##### 🧠 Quality-of-Life Features
##### ────────────────────────────────

# Open nvim in a selected folder (Prefix + v)
bind-key v run-shell "~/.local/bin/tmux-nvim-folder"

# Set status bar on top
set -g status-position top


##### ────────────────────────────────
##### 🎨 Appearance / Borders / Themes
##### ────────────────────────────────

##### ────────────────────────────────
##### 🔌 Plugins (TPM)
##### ────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Theme (comment/uncomment one theme block)
# set -g @plugin 'egel/tmux-gruvbox'
# set -g @tmux-gruvbox 'dark256'

# set -g @plugin 'rose-pine/tmux'
# set -g @rose_pine_variant 'main'

set -g @plugin 'vaaleyard/tmux-dotbar'

# Initialize TPM (keep this line last)
run '~/.tmux/plugins/tpm/tpm'

